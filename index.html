<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Love Game</title>

<style>
body{
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}

canvas{
    background:black;
    margin-top:20px;
    border:3px solid pink;
}

#msg{
    display:none;
    font-size:30px;
    color:pink;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🐍 Ăn 5 quả táo để mở bí mật ❤️</h1>

<p>Điểm: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<div id="msg">
    <h2>❤️ Chúc mừng ❤️</h2>
    <p>Em làm người yêu anh nhé?</p>

    <button onclick="alert('❤️ Anh vui lắm ❤️')">
        Đồng ý
    </button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let box=20;

let snake=[
    {x:200,y:200}
];

let food={
    x:Math.floor(Math.random()*20)*20,
    y:Math.floor(Math.random()*20)*20
};

let dx=20;
let dy=0;

let score=0;

document.addEventListener("keydown",e=>{

    if(e.key==="ArrowUp"){
        dx=0; dy=-20;
    }

    if(e.key==="ArrowDown"){
        dx=0; dy=20;
    }

    if(e.key==="ArrowLeft"){
        dx=-20; dy=0;
    }

    if(e.key==="ArrowRight"){
        dx=20; dy=0;
    }

});

function draw(){

    ctx.clearRect(0,0,400,400);

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,20,20);

    for(let s of snake){
        ctx.fillStyle="lime";
        ctx.fillRect(s.x,s.y,20,20);
    }

    let head={
        x:snake[0].x+dx,
        y:snake[0].y+dy
    };

    if(head.x===food.x && head.y===food.y){

        score++;

        document.getElementById("score").innerText=score;

        food={
            x:Math.floor(Math.random()*20)*20,
            y:Math.floor(Math.random()*20)*20
        };

        if(score>=5){

            clearInterval(game);

            document.getElementById("msg").style.display="block";

            return;
        }

    }else{
        snake.pop();
    }

    snake.unshift(head);

}

let game=setInterval(draw,150);

</script>

</body>
</html>
