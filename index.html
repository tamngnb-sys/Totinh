<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Gửi Em ❤️</title><style>body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff9a9e,#fad0c4);font-family:Arial,sans-serif;overflow:hidden}.box{width:90%;max-width:450px;background:#fff;padding:30px;border-radius:25px;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.2)}h1{color:#ff2d75}button{padding:12px 25px;font-size:20px;border:none;border-radius:30px;margin:10px;cursor:pointer}#yes{background:#ff2d75;color:#fff}#no{background:#ddd}.heart{position:fixed;bottom:-20px;animation:fly 4s linear forwards}@keyframes fly{to{transform:translateY(-120vh);opacity:0}}</style></head><body><div class="box"><h1>💖 Em làm người yêu anh nhé? 💖</h1><p>Từ khi gặp em, mỗi ngày của anh đều vui hơn.<br>Anh muốn được đồng hành cùng em thật lâu.<br><br>Em đồng ý nhé? ❤️</p><button id="yes" onclick="yes()">Đồng ý ❤️</button><button id="no" onclick="run()" onmouseover="run()">Không 😝</button><h2 id="result"></h2></div><script>function run(){let btn=document.getElementById("no");btn.style.position="fixed";btn.style.left=Math.random()*80+"vw";btn.style.top=Math.random()*80+"vh"}function yes(){document.getElementById("result").innerHTML="💖 Anh vui lắm! Cảm ơn em đã đồng ý 💖";setInterval(createHeart,100)}function createHeart(){let heart=document.createElement("div");heart.className="heart";heart.innerHTML="❤️";heart.style.left=Math.random()*100+"vw";heart.style.fontSize=(Math.random()*25+15)+"px";document.body.appendChild(heart);setTimeout(()=>{heart.remove()},4000)}</script></body></html>
